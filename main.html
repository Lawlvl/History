<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'rta Osiyo Xaritasi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow-x:hidden}
body{background:#080604;color:#D4B896;font-family:Georgia,'Times New Roman',serif;display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1A1005 0%,#0D0A04 100%);border-bottom:1px solid #C8A84B55;padding:14px 16px 10px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;right:0;width:200px;height:100%;background:radial-gradient(ellipse at right,#C8A84B08 0%,transparent 70%);pointer-events:none}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hdr-left .eyebrow{font-size:9px;letter-spacing:5px;color:#C8A84B77;text-transform:uppercase;margin-bottom:5px}
.hdr-left h1{font-size:clamp(14px,3.5vw,24px);font-weight:400;color:#F0D898;letter-spacing:1px}
.hdr-left .subtitle{font-size:11px;color:#5A4A34;margin-top:3px;letter-spacing:1px}
.era-badge{background:#C8A84B22;border:1px solid #C8A84B55;color:#C8A84B;font-size:10px;padding:4px 10px;border-radius:20px;white-space:nowrap;letter-spacing:1px;flex-shrink:0}

/* TOOLBAR */
.toolbar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;background:#0A0704;border-bottom:1px solid #1E1A0E}
.tbtn{padding:6px 11px;border-radius:20px;cursor:pointer;font-size:11px;font-family:Georgia,serif;border:1px solid #2A2010;background:transparent;color:#6A5A44;transition:all 0.2s;white-space:nowrap}
.tbtn:hover{border-color:#C8A84B66;color:#C8A84B88}
.tbtn.on{border-color:#C8A84B;background:#C8A84B22;color:#C8A84B}
.tbtn.on-red{border-color:#E74C3C;background:#E74C3C22;color:#E74C3C}
.tbtn.on-blue{border-color:#3498DB;background:#3498DB22;color:#3498DB}

/* LAYOUT */
.layout{display:flex;flex:1;min-height:0}
@media(max-width:639px){.layout{flex-direction:column}}

/* SIDEBAR */
.sidebar{background:#0A0704;width:170px;min-width:170px;border-right:1px solid #1E1A0E;overflow-y:auto;display:flex;flex-direction:column}
@media(max-width:639px){.sidebar{width:100%;min-width:unset;flex-direction:row;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid #1E1A0E}}
.slabel{padding:10px 12px 4px;font-size:9px;letter-spacing:3px;color:#C8A84B44;text-transform:uppercase}
@media(max-width:639px){.slabel{display:none}}
.chbtn{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;border:none;background:transparent;color:#5A4A34;font-size:10px;font-family:Georgia,serif;white-space:nowrap;border-left:3px solid transparent;transition:all 0.2s;text-align:left;width:100%}
@media(max-width:639px){.chbtn{white-space:nowrap;border-left:none;border-bottom:3px solid transparent;width:auto;padding:10px 12px}}
.chbtn:hover{background:#C8A84B0A}
.chnum{width:20px;height:20px;border-radius:50%;background:#161208;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;flex-shrink:0;transition:all 0.25s}

/* MAP */
.map-area{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.map-wrap{flex:1;position:relative;background:#080604;min-height:320px}
.map-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* TOOLTIP */
.tooltip{position:absolute;background:#1A1508;border:1px solid #C8A84B55;border-radius:5px;padding:8px 12px;font-size:12px;color:#F0D898;pointer-events:none;display:none;max-width:180px;z-index:10;box-shadow:0 4px 20px #00000088}
.tooltip.show{display:block}
.tooltip .tt-name{font-size:13px;color:#F0D898;margin-bottom:3px}
.tooltip .tt-ch{font-size:10px;color:#C8A84B;letter-spacing:1px}

/* INFO PANEL */
.infopanel{background:#0D0A05;border-top:2px solid #C8A84B;padding:14px 16px;display:none;animation:slideUp 0.2s ease}
.infopanel.show{display:flex;gap:12px;align-items:flex-start}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ip-eyebrow{font-size:9px;letter-spacing:3px;color:#C8A84B88;text-transform:uppercase;margin-bottom:4px}
.ip-name{font-size:18px;color:#F0D898;margin-bottom:6px;font-weight:400}
.ip-desc{font-size:13px;color:#7A6A54;line-height:1.75}
.ip-era{margin-top:7px;font-size:11px;color:#C8A84B;letter-spacing:1px}
.ip-chapter{margin-top:6px;font-size:11px;color:#5A4A34;font-style:italic}
.xbtn{background:transparent;border:1px solid #2A2010;color:#5A4A34;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:16px;flex-shrink:0;line-height:1;transition:all 0.2s}
.xbtn:hover{border-color:#C8A84B;color:#C8A84B}

/* TIMELINE SLIDER */
.timeline{padding:10px 16px;background:#0A0704;border-top:1px solid #1E1A0E;display:none}
.timeline.show{display:block}
.tl-label{font-size:10px;letter-spacing:2px;color:#C8A84B88;text-transform:uppercase;margin-bottom:8px}
.tl-track{display:flex;align-items:center;gap:10px}
.tl-year{font-size:12px;color:#C8A84B;min-width:36px;text-align:center}
input[type=range]{-webkit-appearance:none;flex:1;height:3px;background:linear-gradient(to right,#C8A84B 0%,#2A2010 0%);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#C8A84B;cursor:pointer;border:2px solid #0A0704;box-shadow:0 0 6px #C8A84B55}
.tl-events{margin-top:8px;font-size:11px;color:#5A4A34;min-height:16px;letter-spacing:0.5px;font-style:italic}

/* LEGEND */
.legend{padding:8px 16px;display:flex;gap:10px;flex-wrap:wrap;background:#0A0704;border-top:1px solid #1E1A0E;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#4A3A28}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lcr{margin-left:auto;font-size:9px;color:#2A1E10;letter-spacing:3px}

/* PULSE ANIMATION */
@keyframes pulse{0%{r:8;opacity:0.8}50%{r:14;opacity:0.3}100%{r:8;opacity:0.8}}
.pulse-ring{animation:pulse 2s ease-in-out infinite}

/* COUNTRY HOVER */
.cpth{transition:fill 0.25s,opacity 0.25s}
.cpth:hover{filter:brightness(1.4)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-left">
      <div class="eyebrow">◆ Milliy-Hududiy Chegaralanish</div>
      <h1>O'rta Osiyo Tarixiy Xaritasi</h1>
      <div class="subtitle">1900 — 1991 · 5 Respublika · 10 Qism</div>
    </div>
    <div class="era-badge" id="era-badge">1924</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="tbtn" id="btn-silk" onclick="toggleSilk()">🛤 Ipak Yo'li</button>
  <button class="tbtn on-red" id="btn-border" onclick="toggleBorder()">◈ Chegaralar</button>
  <button class="tbtn on-blue" id="btn-labels" onclick="toggleLabels()">🏷 Nomlar</button>
  <button class="tbtn" id="btn-timeline" onclick="toggleTimeline()">📅 Vaqt chizig'i</button>
  <button class="tbtn" id="btn-reset" onclick="resetAll()" style="margin-left:auto;border-color:#3A2A1A;color:#3A2A1A">↺ Tozalash</button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="slabel">Qismlar</div>
  </div>

  <!-- MAP + INFO -->
  <div class="map-area">
    <div class="map-wrap" id="mapwrap">

      <!-- TOOLTIP -->
      <div class="tooltip" id="tooltip">
        <div class="tt-name" id="tt-name"></div>
        <div class="tt-ch" id="tt-ch"></div>
      </div>

      <svg id="map" viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">

        <!-- Background texture -->
        <defs>
          <radialGradient id="bggrad" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#1A1205"/>
            <stop offset="100%" stop-color="#080604"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="softglow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <rect width="900" height="560" fill="url(#bggrad)"/>

        <!-- Subtle grid -->
        <g opacity="0.08" stroke="#C8A84B" stroke-width="0.5">
          <line x1="150" y1="0" x2="150" y2="560"/>
          <line x1="300" y1="0" x2="300" y2="560"/>
          <line x1="450" y1="0" x2="450" y2="560"/>
          <line x1="600" y1="0" x2="600" y2="560"/>
          <line x1="750" y1="0" x2="750" y2="560"/>
          <line x1="0" y1="140" x2="900" y2="140"/>
          <line x1="0" y1="280" x2="900" y2="280"/>
          <line x1="0" y1="420" x2="900" y2="420"/>
        </g>

        <!-- COUNTRIES -->
        <path id="c-kazakhstan" class="cpth"
          d="M 30,20 L 820,20 L 840,40 L 855,120 L 825,200 L 762,242 L 682,252 L 622,237 L 562,257 L 492,247 L 432,262 L 372,252 L 302,267 L 237,257 L 187,242 L 157,212 L 132,172 L 112,112 L 82,62 Z"
          fill="#7A5C1E" fill-opacity="0.55" stroke="#C8A84B" stroke-width="1.5" cursor="pointer"
          onclick="selCountry('kazakhstan')"
          onmouseenter="hoverCountry(evt,'Qozog\'iston','Qism 4 · 1936')"
          onmouseleave="hideTooltip()"/>

        <path id="c-uzbekistan" class="cpth"
          d="M 187,242 L 302,267 L 372,252 L 432,262 L 492,247 L 532,257 L 572,267 L 592,302 L 582,362 L 557,397 L 512,417 L 452,432 L 372,427 L 292,417 L 242,392 L 217,352 L 207,302 L 197,272 Z"
          fill="#1A5C3A" fill-opacity="0.6" stroke="#C8A84B" stroke-width="1.5" cursor="pointer"
          onclick="selCountry('uzbekistan')"
          onmouseenter="hoverCountry(evt,'O\'zbekiston','Qism 4 · 1924')"
          onmouseleave="hideTooltip()"/>

        <path id="c-turkmenistan" class="cpth"
          d="M 82,282 L 187,242 L 207,302 L 217,352 L 212,412 L 202,462 L 172,492 L 122,497 L 82,477 L 57,432 L 52,362 L 62,312 Z"
          fill="#5C3A1A" fill-opacity="0.6" stroke="#C8A84B" stroke-width="1.5" cursor="pointer"
          onclick="selCountry('turkmenistan')"
          onmouseenter="hoverCountry(evt,'Turkmaniston','Qism 4 · 1925')"
          onmouseleave="hideTooltip()"/>

        <path id="c-kyrgyzstan" class="cpth"
          d="M 572,267 L 622,237 L 682,252 L 732,267 L 752,302 L 722,342 L 682,362 L 642,372 L 607,362 L 592,342 L 592,302 L 582,282 Z"
          fill="#1A3A5C" fill-opacity="0.6" stroke="#C8A84B" stroke-width="1.5" cursor="pointer"
          onclick="selCountry('kyrgyzstan')"
          onmouseenter="hoverCountry(evt,'Qirg\'iziston','Qism 4 · 1936')"
          onmouseleave="hideTooltip()"/>

        <path id="c-tajikistan" class="cpth"
          d="M 582,362 L 607,362 L 642,372 L 682,362 L 702,392 L 692,442 L 662,472 L 622,482 L 582,467 L 557,442 L 542,417 L 512,417 L 557,397 Z"
          fill="#5C1A1A" fill-opacity="0.6" stroke="#C8A84B" stroke-width="1.5" cursor="pointer"
          onclick="selCountry('tajikistan')"
          onmouseenter="hoverCountry(evt,'Tojikiston','Qism 4 · 1929')"
          onmouseleave="hideTooltip()"/>

        <!-- Mountain ranges (decorative) -->
        <g id="mountains" opacity="0.18" fill="#C8A84B" pointer-events="none">
          <polygon points="700,440 710,418 720,440"/>
          <polygon points="714,438 726,414 738,438"/>
          <polygon points="728,442 742,416 756,442"/>
          <polygon points="660,400 668,384 676,400"/>
          <polygon points="672,398 682,378 692,398"/>
        </g>

        <!-- Aral Sea -->
        <ellipse id="aral-el" cx="300" cy="208" rx="46" ry="30"
          fill="#1A4A6B" fill-opacity="0.85" stroke="#5DADE2" stroke-width="1.2"
          cursor="pointer"
          onclick="selCity('aral')"
          onmouseenter="hoverCountry(evt,'Orol Dengizi','Qism 8')"
          onmouseleave="hideTooltip()"/>
        <text x="300" y="212" text-anchor="middle" fill="#5DADE2" font-size="9" font-family="Georgia" opacity="0.9" pointer-events="none">Orol</text>

        <!-- Caspian Sea hint -->
        <ellipse cx="42" cy="190" rx="22" ry="60" fill="#1A4A6B" fill-opacity="0.5" stroke="#5DADE2" stroke-width="0.8" pointer-events="none"/>
        <text x="42" y="192" text-anchor="middle" fill="#5DADE2" font-size="7" font-family="Georgia" opacity="0.6" pointer-events="none">Kaspiy</text>

        <!-- Fergana Valley ring -->
        <ellipse cx="558" cy="332" rx="38" ry="22"
          fill="#3498DB" fill-opacity="0.06"
          stroke="#3498DB" stroke-width="1.2" stroke-dasharray="5,3"
          pointer-events="none"/>

        <!-- COUNTRY LABELS group -->
        <g id="country-labels">
          <text x="430" y="128" text-anchor="middle" fill="#F0D898" font-size="11" font-family="Georgia" letter-spacing="3" opacity="0.55" pointer-events="none">QOZOG'ISTON</text>
          <text x="385" y="338" text-anchor="middle" fill="#F0D898" font-size="10" font-family="Georgia" letter-spacing="2" opacity="0.55" pointer-events="none">O'ZBEKISTON</text>
          <text x="128" y="390" text-anchor="middle" fill="#F0D898" font-size="8.5" font-family="Georgia" letter-spacing="2" opacity="0.55" pointer-events="none">TURKMANISTON</text>
          <text x="658" y="310" text-anchor="middle" fill="#F0D898" font-size="8.5" font-family="Georgia" letter-spacing="2" opacity="0.55" pointer-events="none">QIRG'IZISTON</text>
          <text x="628" y="434" text-anchor="middle" fill="#F0D898" font-size="8.5" font-family="Georgia" letter-spacing="2" opacity="0.55" pointer-events="none">TOJIKISTON</text>
        </g>

        <!-- SILK ROAD -->
        <g id="silkroad" display="none" pointer-events="none">
          <path d="M 30,308 Q 155,288 258,328 Q 342,358 422,362 Q 492,342 537,342 Q 592,347 652,332 Q 722,312 822,288"
            fill="none" stroke="#C8A84B" stroke-width="2.5" stroke-dasharray="8,5" opacity="0.6" filter="url(#softglow)"/>
          <text x="250" y="348" fill="#C8A84B" font-size="9" font-family="Georgia" opacity="0.7" transform="rotate(-3,250,348)">✦ Ipak Yo'li ✦</text>
        </g>

        <!-- CITY MARKERS -->
        <g id="markers"></g>

        <!-- Compass rose -->
        <g transform="translate(856,508)" pointer-events="none">
          <circle cx="0" cy="0" r="20" fill="#0D0A05" stroke="#C8A84B" stroke-width="0.8" opacity="0.5"/>
          <circle cx="0" cy="0" r="3" fill="#C8A84B" opacity="0.6"/>
          <line x1="0" y1="-17" x2="0" y2="17" stroke="#C8A84B" stroke-width="0.8" opacity="0.4"/>
          <line x1="-17" y1="0" x2="17" y2="0" stroke="#C8A84B" stroke-width="0.8" opacity="0.4"/>
          <polygon points="0,-17 -3,-10 3,-10" fill="#C8A84B" opacity="0.7"/>
          <text x="0" y="-8" text-anchor="middle" fill="#C8A84B" font-size="7" font-family="Georgia" font-weight="bold">N</text>
          <text x="0" y="14" text-anchor="middle" fill="#C8A84B" font-size="6" font-family="Georgia" opacity="0.5">S</text>
          <text x="10" y="3" text-anchor="middle" fill="#C8A84B" font-size="6" font-family="Georgia" opacity="0.5">E</text>
          <text x="-10" y="3" text-anchor="middle" fill="#C8A84B" font-size="6" font-family="Georgia" opacity="0.5">W</text>
        </g>

        <!-- Scale bar -->
        <g transform="translate(30,530)" pointer-events="none" opacity="0.4">
          <line x1="0" y1="0" x2="80" y2="0" stroke="#C8A84B" stroke-width="1"/>
          <line x1="0" y1="-4" x2="0" y2="4" stroke="#C8A84B" stroke-width="1"/>
          <line x1="80" y1="-4" x2="80" y2="4" stroke="#C8A84B" stroke-width="1"/>
          <text x="40" y="-6" text-anchor="middle" fill="#C8A84B" font-size="7" font-family="Georgia">≈ 500 km</text>
        </g>

      </svg>
    </div><!-- /map-wrap -->

    <!-- TIMELINE -->
    <div class="timeline" id="timeline-bar">
      <div class="tl-label">📅 Tarixiy Vaqt Chizig'i</div>
      <div class="tl-track">
        <span class="tl-year">1900</span>
        <input type="range" id="tl-slider" min="1900" max="1991" value="1924" step="1" oninput="updateTimeline(this.value)">
        <span class="tl-year">1991</span>
      </div>
      <div class="tl-events" id="tl-event">1924 — O'rta Osiyo respublikalari tashkil etildi</div>
    </div>

    <!-- INFO PANEL -->
    <div class="infopanel" id="infopanel">
      <div style="flex:1">
        <div class="ip-eyebrow" id="ip-ch"></div>
        <div class="ip-name" id="ip-name"></div>
        <div class="ip-desc" id="ip-desc"></div>
        <div class="ip-era" id="ip-era"></div>
        <div class="ip-chapter" id="ip-chapter"></div>
      </div>
      <button class="xbtn" onclick="closeInfo()">×</button>
    </div>

  </div><!-- /map-area -->
</div><!-- /layout -->

<!-- LEGEND -->
<div class="legend">
  <div class="li"><div class="ld" style="background:#F39C12"></div>Poytaxt</div>
  <div class="li"><div class="ld" style="background:#C8A84B"></div>Tarixiy shahar</div>
  <div class="li"><div class="ld" style="background:#3498DB"></div>Mintaqa</div>
  <div class="li"><div class="ld" style="background:#E74C3C"></div>Shahar</div>
  <div class="li"><div class="ld" style="background:#5DADE2"></div>Suv havzasi</div>
  <div class="lcr">1900 – 1991</div>
</div>

<script>
var locs=[
  {id:"tashkent",  name:"Toshkent",       x:490,y:332,type:"capital", ch:1, desc:"O'zbekistonning poytaxti. 1966-yil zilzilasidan keyin Sovet shahriga aylandi. Ikki dunyo — bir zaminda.", era:"◆ 1966 — Zilzila va qayta qurilish"},
  {id:"samarkand", name:"Samarqand",       x:420,y:364,type:"historic",ch:5, desc:"Ipak yo'lining marvaridi. Ikki xalq — bir shahar. Ikki ming yillik tarix.", era:"◆ Qism 5 — Samarqand masalasi"},
  {id:"bukhara",   name:"Buxoro",          x:338,y:357,type:"historic",ch:5, desc:"Islom ilmining markazi. Ming yillik amirlik — bir kechada qulab tushdi.", era:"◆ 1920 — Amirliq quladi"},
  {id:"khiva",     name:"Xiva",            x:254,y:328,type:"historic",ch:1, desc:"Qadimiy xonlik shahri. Uch xonlik. Uch taxt. Bir madaniyat.", era:"◆ Xorazm xonligi"},
  {id:"kokand",    name:"Qo'qon",          x:536,y:346,type:"historic",ch:2, desc:"Ozodlik orzusi — 72 kunda so'ndi. Qo'qon muxtoriyatining qalbi.", era:"◆ 1917–1918 — Qo'qon Muxtoriyati"},
  {id:"fergana",   name:"Farg'ona",        x:558,y:320,type:"region",  ch:6, desc:"Dunyodagi eng murakkab chegaralar. Bir vodiy — uch qismga bo'lindi.", era:"◆ O'zbekiston, Qirg'iziston, Tojikiston"},
  {id:"osh",       name:"O'sh",            x:594,y:352,type:"city",    ch:6, desc:"O'sh — o'zbek shahri. Lekin chegara uni Qirg'izistonga berdi.", era:"◆ Qism 6 — Farg'ona chegarasi"},
  {id:"almaty",    name:"Olmaota",         x:712,y:238,type:"capital", ch:4, desc:"Qozog'istonning qadimiy poytaxti. Dasht va tog'lar — sovet xaritasida.", era:"◆ 1936 — Qozog'iston SSR"},
  {id:"ashgabat",  name:"Ashgabat",        x:128,y:444,type:"capital", ch:4, desc:"Turkmaniston — cho'llar va tarix ustiga qurilgan yangi respublika.", era:"◆ 1925 — Turkmaniston SSR"},
  {id:"dushanbe",  name:"Dushanbe",        x:596,y:420,type:"capital", ch:4, desc:"Tojiklar respublika oldi — lekin o'z shaharlari ularsiz qoldi.", era:"◆ 1929 — Tojikiston SSR"},
  {id:"bishkek",   name:"Bishkek",         x:624,y:270,type:"capital", ch:4, desc:"Qirg'iziston poytaxti. Tog'lar ortidagi yangi dunyo.", era:"◆ 1936 — Qirg'iziston SSR"},
  {id:"aral",      name:"Orol Dengizi",    x:300,y:208,type:"water",   ch:8, desc:"Orol dengizi fojiasi — chegaralanish siyosatining azobi. Paxta uchun suv olindi — Orol qurib bordi.", era:"◆ 1960-yildan qurib bordi"},
  {id:"andijan",   name:"Andijon",         x:570,y:338,type:"city",    ch:6, desc:"Farg'ona vodiysining eng katta shahri. Andijon. Namangan. Farg'ona. Ular O'zbekistonga berildi.", era:"◆ Farg'ona vodiysi — O'zbekiston"},
  {id:"merv",      name:"Marv (Merv)",     x:165,y:455,type:"historic",ch:1, desc:"Qadimiy Marv — Ipak yo'lining muhim shahri. Buyuk Saljuqiylar imperiyasining poytaxti.", era:"◆ Qadimiy Ipak Yo'li shahri"},
];

var countries={
  kazakhstan:{name:"Qozog'iston",ch:4,desc:"Ulkan dasht yurti. Sovet chegaralanishida eng katta respublika bo'ldi. Qozoqlar yurtsizlik fojeasini boshdan kechirdi.",era:"1936 — SSR maqomini oldi"},
  uzbekistan:{name:"O'zbekiston",ch:4,desc:"O'rta Osiyoning qalbi. 1924-yil tashkil etildi. Samarqand, Buxoro, Toshkent — tarix shaharlari. 1991-yil — ozodlik.",era:"1924 — SSR tashkil etildi"},
  turkmenistan:{name:"Turkmaniston",ch:4,desc:"Qoraqum cho'li yurti. Gaz va neft boyliklari ustiga qurilgan respublika.",era:"1925 — SSR tashkil etildi"},
  kyrgyzstan:{name:"Qirg'iziston",ch:4,desc:"Tian Shan tog'lari yurti. Farg'ona vodiysi ustidagi respublika. O'sh shahri muammosi hali ham davom etmoqda.",era:"1936 — SSR tashkil etildi"},
  tajikistan:{name:"Tojikiston",ch:4,desc:"Pamir tog'lari yurti. Samarqand va Buxorosiz qolgan respublika. Tojiklar o'z tarixiy shaharlaridan ayrildi.",era:"1929 — SSR tashkil etildi"},
};

  {num:2,title:"Inqilob",          color:"#E74C3C"},
  {num:3,title:"Siyosat",          color:"#8E44AD"},
  {num:4,title:"1924 Yil",         color:"#E67E22"},
  {num:5,title:"Samarqand/Buxoro", color:"#2ECC71"},
  {num:6,title:"Farg'ona",         color:"#3498DB"},
  {num:7,title:"Madaniy Oqibat",   color:"#1ABC9C"},
  {num:8,title:"Suv Nizosi",       color:"#5DADE2"},

  1900:"1900 — O'rta Osiyo Rossiya mustamlakasi ostida",
  1905:"1905 — Rus inqilobi to'lqinlari O'rta Osiyoga yetib keldi",
  1916:"1916 — Katta qo'zg'olon: O'zbek va Qozog'lar Rossiyaga qarshi",

  1918:"1918 — Qo'qon Muxtoriyati Qizil Armiya tomonidan yo'q qilindi",
  1920:"1920 — Buxoro amirligi va Xiva xonligi quladi",
  1921:"1921 — Bosmachilar harakati avj oldi",
  1924:"1924 — O'rta Osiyo respublikalari tashkil etildi",
  1925:"1925 — Turkmaniston SSR tashkil etildi",
  1929:"1929 — Tojikiston SSR tashkil etildi",
  1930:"1930 — Kollektivlashtirish va ocharchilik",
  1936:"1936 — Qozog'iston va Qirg'iziston SSR maqomini oldi",
  1937:"1937 — Stalin qatag'onlari: ziyolilar qirildi",
  1941:"1941 — Ikkinchi Jahon Urushi boshlandi",
  1945:"1945 — G'alaba. 1.5 million o'zbek frontda urushdi",
  1960:"1960 — Orol dengizi qurib borishni boshladi",
  1966:"1966 — Toshkent zilzilasi",
  1980:"1980 — Sovet Afg'onistonga bostirib kirdi",
  1985:"1985 — Gorbachev islohatlari boshlandi",
  1989:"1989 — Farg'ona vodiysida zo'ravonlik",
  1990:"1990 — O'zbekiston suverenitetini e'lon qildi",
  1991:"1991 — SSSR qulab tushdi. Mustaqillik!",
};

var typeColors={capital:"#F39C12",historic:"#C8A84B",region:"#3498DB",city:"#E74C3C",water:"#5DADE2"};
var activeCh=null,selId=null,silkOn=false,borderOn=true,labelsOn=true,tlOn=false;

// Build sidebar
var sb=document.getElementById('sidebar');
chapters.forEach(function(ch){
  var b=document.createElement('button');
  b.className='chbtn';b.id='chb-'+ch.num;
  b.innerHTML='<span class="chnum" id="chn-'+ch.num+'" style="border:1px solid '+ch.color+'44;color:'+ch.color+'">'+ch.num+'</span><span>'+ch.title+'</span>';
  b.onclick=(function(n){return function(){toggleCh(n);};})(ch.num);
  sb.appendChild(b);
});

function svgEl(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag);}

function buildMarkers(){
  var g=document.getElementById('markers');
  g.innerHTML='';
  locs.forEach(function(loc){
    var col=typeColors[loc.type]||'#C8A84B';
    var act=activeCh?loc.ch===activeCh:true;
    var sel=selId===loc.id;
    var r=sel?8:(loc.type==='capital'?6:4.5);

    var grp=svgEl('g');
    grp.style.cursor='pointer';
    grp.style.opacity=act?'1':'0.12';
    grp.setAttribute('onclick',"selCity('"+loc.id+"')");
    grp.setAttribute('onmouseenter',"hoverCity(evt,'"+loc.name+"','Qism "+loc.ch+"')");
    grp.setAttribute('onmouseleave','hideTooltip()');

    // Pulse ring for selected
    if(sel){
      var ring=svgEl('circle');
      ring.setAttribute('cx',loc.x);ring.setAttribute('cy',loc.y);
      ring.setAttribute('r','16');ring.setAttribute('fill','none');
      ring.setAttribute('stroke',col);ring.setAttribute('stroke-width','1.5');
      ring.setAttribute('opacity','0.4');
      grp.appendChild(ring);
    }

    // Glow for capitals
    if(loc.type==='capital'&&act){
      var glow=svgEl('circle');
      glow.setAttribute('cx',loc.x);glow.setAttribute('cy',loc.y);
      glow.setAttribute('r',r+4);glow.setAttribute('fill',col);
      glow.setAttribute('fill-opacity','0.12');
      grp.appendChild(glow);
    }

    var c=svgEl('circle');
    c.setAttribute('cx',loc.x);c.setAttribute('cy',loc.y);
    c.setAttribute('r',r);
    c.setAttribute('fill',sel?col:col+'BB');
    c.setAttribute('stroke',col);c.setAttribute('stroke-width',sel?'2':'1.2');
    grp.appendChild(c);

    // Inner dot for capitals
    if(loc.type==='capital'){
      var inn=svgEl('circle');
      inn.setAttribute('cx',loc.x);inn.setAttribute('cy',loc.y);
      inn.setAttribute('r','2');inn.setAttribute('fill','#0A0804');
      grp.appendChild(inn);
    }

    var lx=(loc.id==='fergana'||loc.id==='aral')?loc.x:loc.x+10;
    var ly=(loc.id==='fergana')?loc.y+16:(loc.id==='aral')?loc.y+20:loc.y+4;
    var t=svgEl('text');
    t.setAttribute('x',lx);t.setAttribute('y',ly);
    t.setAttribute('fill',sel?col:'#C8B890');
    t.setAttribute('font-size',loc.type==='capital'?'10':'8.5');
    t.setAttribute('font-family','Georgia,serif');
    t.setAttribute('pointer-events','none');
    t.setAttribute('opacity',sel?'1':'0.8');
    t.textContent=loc.name;
    grp.appendChild(t);

    g.appendChild(grp);
  });
}

function selCity(id){
  if(selId===id){selId=null;closeInfo();buildMarkers();return;}
  selId=id;
  var loc=locs.find(function(l){return l.id===id;});
  if(!loc)return;
  showInfo('Qism '+loc.ch,loc.name,loc.desc,loc.era,'Video '+(((loc.ch-1)*6)+1)+' – '+((loc.ch*6)));
  buildMarkers();
}

function selCountry(key){
  var c=countries[key];if(!c)return;
  selId=key;
  showInfo('Respublika · Qism '+c.ch,c.name,c.desc,'◆ '+c.era,'');
  buildMarkers();
}

function hoverCountry(evt,name,ch){
  var tt=document.getElementById('tooltip');
  document.getElementById('tt-name').textContent=name;
  document.getElementById('tt-ch').textContent=ch;
  posTooltip(evt,tt);
}
function hoverCity(evt,name,ch){
  var tt=document.getElementById('tooltip');
  document.getElementById('tt-name').textContent=name;
  document.getElementById('tt-ch').textContent=ch;
  posTooltip(evt,tt);
}
function posTooltip(evt,tt){
  var wrap=document.getElementById('mapwrap');
  var rect=wrap.getBoundingClientRect();
  var x=evt.clientX-rect.left+12;
  var y=evt.clientY-rect.top-30;
  if(x+190>rect.width)x=evt.clientX-rect.left-190;
  tt.style.left=x+'px';tt.style.top=y+'px';
  tt.className='tooltip show';
}
function hideTooltip(){document.getElementById('tooltip').className='tooltip';}

function showInfo(ch,name,desc,era,videos){
  document.getElementById('ip-ch').textContent=ch;
  document.getElementById('ip-name').textContent=name;
  document.getElementById('ip-desc').textContent=desc;
  document.getElementById('ip-era').textContent=era;
  document.getElementById('ip-chapter').textContent=videos?'🎬 '+videos:'';
  document.getElementById('infopanel').className='infopanel show';
}
function closeInfo(){
  selId=null;
  document.getElementById('infopanel').className='infopanel';
  buildMarkers();
}

function toggleCh(num){
  activeCh=(activeCh===num)?null:num;
  chapters.forEach(function(ch){
    var btn=document.getElementById('chb-'+ch.num);
    var num2=document.getElementById('chn-'+ch.num);
    var on=activeCh===ch.num;
    btn.style.borderLeft=on?'3px solid '+ch.color:'3px solid transparent';
    btn.style.background=on?ch.color+'0D':'transparent';
    btn.style.color=on?ch.color:'#5A4A34';
    num2.style.background=on?ch.color:'#161208';
    num2.style.color=on?'#000':ch.color;
    // mobile
    btn.style.borderBottom=on?'3px solid '+ch.color:'3px solid transparent';
  });
  buildMarkers();
  // Update era badge
  if(activeCh){
    var ch=chapters.find(function(c){return c.num===activeCh;});
    document.getElementById('era-badge').textContent='Qism '+activeCh;
    document.getElementById('era-badge').style.color=ch.color;
    document.getElementById('era-badge').style.borderColor=ch.color+'55';
    document.getElementById('era-badge').style.background=ch.color+'22';
  } else {
    document.getElementById('era-badge').textContent='1924';
    document.getElementById('era-badge').style.color='#C8A84B';
    document.getElementById('era-badge').style.borderColor='#C8A84B55';
    document.getElementById('era-badge').style.background='#C8A84B22';
  }
}

function toggleSilk(){
  silkOn=!silkOn;
  document.getElementById('silkroad').setAttribute('display',silkOn?'block':'none');
  document.getElementById('btn-silk').className=silkOn?'tbtn on':'tbtn';
}

function toggleBorder(){
  borderOn=!borderOn;
  document.querySelectorAll('.cpth').forEach(function(p){
    p.setAttribute('stroke-width',borderOn?'1.5':'0.3');
    p.setAttribute('stroke-opacity',borderOn?'1':'0.3');
  });
  document.getElementById('btn-border').className=borderOn?'tbtn on-red':'tbtn';
}

function toggleLabels(){
  labelsOn=!labelsOn;
  document.getElementById('country-labels').style.display=labelsOn?'block':'none';
  document.getElementById('btn-labels').className=labelsOn?'tbtn on-blue':'tbtn';
}

function toggleTimeline(){
  tlOn=!tlOn;
  document.getElementById('timeline-bar').className=tlOn?'timeline show':'timeline';
  document.getElementById('btn-timeline').className=tlOn?'tbtn on':'tbtn';
}

function updateTimeline(val){
  var yr=parseInt(val);
  document.getElementById('era-badge').textContent=yr;
  // Find closest event
  var keys=Object.keys(timelineEvents).map(Number).sort(function(a,b){return a-b;});
  var closest=keys.reduce(function(prev,curr){return Math.abs(curr-yr)<Math.abs(prev-yr)?curr:prev;});
  var msg=timelineEvents[closest]||'';
  document.getElementById('tl-event').textContent=msg;
  // Update slider gradient
  var pct=((yr-1900)/(1991-1900)*100).toFixed(1);
  var slider=document.getElementById('tl-slider');
  slider.style.background='linear-gradient(to right, #C8A84B '+pct+'%, #2A2010 '+pct+'%)';
  // Fade Aral Sea based on year (shrinks after 1960)
  var aral=document.getElementById('aral-el');
  if(yr>=1960){
    var fade=Math.max(0.2,1-((yr-1960)/31*0.8));
    var rx=Math.max(10,46*(fade));
    var ry=Math.max(6,30*(fade));
    aral.setAttribute('rx',rx.toFixed(1));
    aral.setAttribute('ry',ry.toFixed(1));
    aral.setAttribute('fill-opacity',(fade*0.85).toFixed(2));
  } else {
    aral.setAttribute('rx','46');aral.setAttribute('ry','30');aral.setAttribute('fill-opacity','0.85');
  }
}

function resetAll(){
  activeCh=null;selId=null;
  chapters.forEach(function(ch){
    var btn=document.getElementById('chb-'+ch.num);
    var n=document.getElementById('chn-'+ch.num);
    btn.style.borderLeft='3px solid transparent';
    btn.style.borderBottom='3px solid transparent';
    btn.style.background='transparent';
    btn.style.color='#5A4A34';
    n.style.background='#161208';n.style.color=ch.color;
  });
  document.getElementById('infopanel').className='infopanel';
  document.getElementById('era-badge').textContent='1924';
  document.getElementById('era-badge').style.color='#C8A84B';
  document.getElementById('era-badge').style.borderColor='#C8A84B55';
  document.getElementById('era-badge').style.background='#C8A84B22';
  buildMarkers();
}

buildMarkers();

// Fix SVG height on mobile
function fixMapHeight(){
  var wrap=document.getElementById('mapwrap');
  var wh=window.innerHeight;
  var tb=document.querySelector('.toolbar').offsetHeight||44;
  var sl=document.querySelector('.sidebar').offsetHeight||0;
  var lg=document.querySelector('.legend').offsetHeight||32;
  var hd=document.querySelector('.hdr').offsetHeight||70;
  var avail=wh-tb-lg-hd-sl-10;
  if(window.innerWidth<640){wrap.style.minHeight=Math.max(260,avail)+'px';}
  else{wrap.style.minHeight=Math.max(320,avail)+'px';}
}
window.addEventListener('resize',fixMapHeight);
fixMapHeight();
</script>
